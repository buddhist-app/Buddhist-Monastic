<script>
  function getNextUposatha() {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    for (let item of upo) {
      const date = new Date(item.date);
      date.setHours(0, 0, 0, 0);
      if (date.getTime() === today.getTime()) {
        const sessionOrdinal = getOrdinal(item.session);
        return {
          title: 'TODAY IS UPOSATHA',
          subtitle: item.season + ' Season ' + sessionOrdinal + ' Session'
        };
      }
      if (date > today) {
        const daysUntil = Math.round((date - today) / 86400000);
        return {
          date: item.date,
          days: daysUntil
        };
      }
    }
    return 'No upcoming uposatha';
  }

  function getOrdinal(n) {
    const num = parseInt(n);
    if (num === 1) return '1st';
    if (num === 2) return '2nd';
    if (num === 3) return '3rd';
    return num + 'th';
  }

  const nextElement = document.getElementById('next-uposatha');
  const nextUposatha = getNextUposatha();
  if (typeof nextUposatha === 'object') {
    if (nextUposatha.title) {
      nextElement.innerHTML = nextUposatha.title + '<br>' + nextUposatha.subtitle;
    } else {
      nextElement.textContent = 'Next Uposatha: ' + nextUposatha.date + ' in ' + nextUposatha.days + ' days';
    }
  } else {
    nextElement.textContent = 'Next Uposatha: ' + nextUposatha;
  }
</script>
